<section class="services">
  <div class="container mx-auto lg:px-8 px-4">

    <div class="services__header">
      <h2 class="services__title">{{ 'services.title' | translate }}</h2>
      <div class="services__arrows">
        <button class="services__arrow services__arrow--prev" aria-label="Previous">
          <i class="icon icon-chevron-left-solid-full"></i>
        </button>
        <button class="services__arrow services__arrow--next" aria-label="Next">
          <i class="icon icon-chevron-right-solid-full"></i>
        </button>
      </div>
    </div>

    <div #swiperEl class="swiper">
      <div class="swiper-wrapper">
        @for (service of services; track service.link) {
          <div class="swiper-slide">
            <div class="service-card">
              <div class="service-card__icon">
                <img [src]="service.icon" [alt]="service.titleKey | translate" />
              </div>
              <h3 class="service-card__title">{{ service.titleKey | translate }}</h3>
              <a class="service-card__link" [routerLink]="service.link">
                {{ 'services.readMore' | translate }}
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M3 7h8M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </a>
            </div>
          </div>
        }
      </div>
      <div class="services__pagination swiper-pagination"></div>
    </div>

  </div>
</section>
