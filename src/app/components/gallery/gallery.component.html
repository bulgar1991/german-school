<section class="gallery">
  <div class="container-screen-4xl mx-auto lg:px-8 px-4">

    <!-- Header row -->
    <div class="gallery__header">
      <h2 class="gallery__title">{{ 'gallery.title' | translate }}</h2>
      <a class="gallery__view-all" routerLink="/galerie">
        {{ 'gallery.viewAll' | translate }}
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9.5 4.5L13 8l-3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <!-- Photo grid -->
    <div class="gallery__grid">
      @for (photo of photos; track photo.src) {
        <div class="gallery__item" [class.gallery__item--wide]="photo.wide">
          <img [src]="photo.src" [alt]="photo.alt" loading="lazy" />
        </div>
      }
    </div>
  </div>
</section>
