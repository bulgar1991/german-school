<section class="cta-wa">
  <div class="container">
    <div class="cta-wa__card">

      <!-- Decorative sparkles -->
      <svg class="cta-wa__spark cta-wa__spark--tl" width="24" height="24" viewBox="0 0 24 24" fill="white" aria-hidden="true">
        <path d="M12 2l1.5 8.5L22 12l-8.5 1.5L12 22l-1.5-8.5L2 12l8.5-1.5z"/>
      </svg>
      <svg class="cta-wa__spark cta-wa__spark--bl" width="32" height="32" viewBox="0 0 24 24" fill="white" aria-hidden="true">
        <path d="M12 2l1.5 8.5L22 12l-8.5 1.5L12 22l-1.5-8.5L2 12l8.5-1.5z"/>
      </svg>

      <!-- Left: text -->
      <div class="cta-wa__body">
        <h2 class="cta-wa__title">{{ 'ctaWhatsapp.title' | translate }}</h2>
        <p class="cta-wa__desc">{{ 'ctaWhatsapp.desc' | translate }}</p>
        <a class="cta-wa__btn" href="https://wa.me/37369136065" target="_blank" rel="noopener">
          {{ 'ctaWhatsapp.btn' | translate }}
        </a>
      </div>

      <!-- Right: image -->
      <div class="cta-wa__image-wrap">
        <img src="assets/images/cta-whatsapp.png" alt="" aria-hidden="true" />
      </div>

    </div>
  </div>
</section>
