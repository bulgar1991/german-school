<header class="header" [class.header--scrolled]="scrolled()">
  <div class="container mx-auto lg:px-desktop px-mobile">
    <div class="header__inner">
      <a class="header__logo" routerLink="/" aria-label="CLG Chișinău">
        <img src="assets/images/site-logo.svg" alt="CLG Chișinău" class="header__logo-image" />
      </a>

      <nav class="header__nav" aria-label="Navigare principală">
        <ul class="header__nav-list">
          @for (link of navLinks; track link.anchor) {
            <li>
              <a class="header__nav-link"
                 [routerLink]="link.anchor"
                 routerLinkActive="header__nav-link--active"
                 [routerLinkActiveOptions]="{ exact: link.anchor === '/' }">
                {{ link.key | translate }}
              </a>
            </li>
          }
        </ul>
      </nav>

      <div class="header__actions">
        <a class="header__contact-link" routerLink="/contact">
          <i class="icon icon-phone-solid-full"></i>
          <span class="header__contact-link-text">{{ 'nav.contact' | translate }}</span>
        </a>
        <app-language-switcher />
      </div>

      <button class="header__hamburger" (click)="openSidebar()"
              aria-label="Deschide meniu" [attr.aria-expanded]="sidebarOpen()">
        <span></span><span></span><span></span>
      </button>

    </div>
  </div>
</header>

@if (sidebarOpen()) {
  <div class="sidebar-overlay" (click)="closeSidebar()" aria-hidden="true"></div>
  <aside class="sidebar" role="dialog" aria-modal="true">
    <div class="sidebar__header">
      <a class="sidebar__logo" routerLink="/" (click)="closeSidebar()">
        <img src="assets/images/site-logo.svg" alt="CLG Chișinău" class="sidebar__logo-img" />
      </a>
      <button class="sidebar__close" (click)="closeSidebar()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <nav class="sidebar__nav">
      @for (link of navLinks; track link.anchor) {
        <a class="sidebar__link" [routerLink]="link.anchor"
           routerLinkActive="sidebar__link--active"
           [routerLinkActiveOptions]="{ exact: link.anchor === '/' }"
           (click)="closeSidebar()">
          {{ link.key | translate }}
        </a>
      }
    </nav>
    <div class="sidebar__footer">
      <app-language-switcher />
      <a class="btn btn--primary" style="width:100%" routerLink="/contact" (click)="closeSidebar()">
        {{ 'nav.contact' | translate }}
      </a>
    </div>
  </aside>
}
