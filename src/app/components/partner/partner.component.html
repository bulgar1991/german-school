<section class="partner">
  <div class="container">
    <div class="partner__card">

      <div class="partner__body">
        <h2 class="partner__title">{{ 'partner.title' | translate }}</h2>
        <p class="partner__desc">{{ 'partner.desc' | translate }}</p>
        <p class="partner__link-row">
          <span class="partner__link-label">{{ 'partner.visitLabel' | translate }}</span>
          <a
            class="partner__link"
            href="https://www.osd.at"
            target="_blank"
            rel="noopener noreferrer">
            www.osd.at
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M5.5 2.5H2A1 1 0 0 0 1 3.5v8.5A1 1 0 0 0 2 13h8.5a1 1 0 0 0 1-1V8.5M8.5 1H13m0 0v4.5M13 1 6 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </p>
      </div>

      <div class="partner__logo">
        <!-- Place your ÖSD logo at assets/images/osd-logo.svg -->
        <img src="assets/images/osd-logo.svg" alt="ÖSD Prüfungszentrum" />
      </div>

    </div>
  </div>
</section>
