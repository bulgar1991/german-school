<footer class="footer">

  <div class="footer__main">
    <div class="container footer__inner">

      <!-- Logo -->
      <a class="footer__logo" routerLink="/" aria-label="CLG Chișinău">
        <div class="footer__flags">
          <img class="footer__flag" src="assets/flags/at.svg" alt="Austria" />
          <img class="footer__flag" src="assets/flags/ch.svg" alt="Switzerland" />
          <img class="footer__flag" src="assets/flags/de.svg" alt="Germany" />
        </div>
        <span class="footer__logo-text">CLG Chișinău</span>
      </a>

      <!-- Nav links -->
      <nav class="footer__nav" aria-label="Footer navigation">
        @for (link of navLinks; track link.link) {
          <a class="footer__nav-link" [routerLink]="link.link">
            {{ link.key | translate }}
          </a>
        }
      </nav>

      <!-- Social icons -->
      <div class="footer__socials">
        <a class="footer__social" href="#" aria-label="Facebook" target="_blank" rel="noopener">

          </svg>
        </a>
        <a class="footer__social" href="#" aria-label="Instagram" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </a>
        <a class="footer__social" href="#" aria-label="Viber" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

          </svg>
        </a>
        <a class="footer__social" href="https://wa.me/37369136065" aria-label="WhatsApp" target="_blank" rel="noopener">

    </div>
  </div>

  <!-- Bottom bar -->
  <div class="footer__bottom">
    <div class="container">
      <p class="footer__copy">{{ 'footer.copy' | translate : { year: year } }}</p>
    </div>
  </div>

</footer>
