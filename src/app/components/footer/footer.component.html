<footer class="footer">
  <div class="footer__main">
    <div class="container mx-auto lg:px-8 px-4">
      <div class="footer__inner">
        <!-- Logo -->
        <a class="footer__logo" routerLink="/" aria-label="CLG Chișinău">
          <img src="assets/images/site-logo.svg" alt="CLG Chișinău" class="footer__logo-image" />
        </a>

        <!-- Nav links -->
        <nav class="footer__nav" aria-label="Footer navigation">
          @for (link of navLinks; track link.link) {
            <a class="footer__nav-link" [routerLink]="link.link">
              {{ link.key | translate }}
            </a>
          }
        </nav>

        <!-- Social icons -->
        <div class="footer__socials">
          <a class="footer__social" href="#" aria-label="Facebook" target="_blank" rel="noopener">
            <i class="icon icon-facebook-f-brands-solid-full"></i>
          </a>
          <a class="footer__social" href="#" aria-label="Viber" target="_blank" rel="noopener">
            <i class="icon icon-viber-brands-solid-full"></i>
          </a>
          <a
            class="footer__social"
            href="https://wa.me/37369136065"
            aria-label="WhatsApp"
            target="_blank"
            rel="noopener">
            <i class="icon icon-whatsapp-brands-solid-full"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="footer__bottom">
    <div class="container mx-auto lg:px-8 px-4">
      <p class="footer__copy">{{ 'footer.copy' | translate: { year: year } }}</p>
    </div>
  </div>
</footer>
