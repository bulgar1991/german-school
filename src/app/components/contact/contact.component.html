<section class="contact">
  <div class="container-screen-4xl mx-auto lg:px-8 px-4">
    <div class="contact__inner">
      <!-- Left: info -->
      <div class="contact__info">
        <h2 class="contact__title">{{ 'contact.title' | translate }}</h2>

        <ul class="contact__list">
          <li class="contact__item">
            <i class="icon icon-map-location-dot-solid-full"></i>
            <span>{{ 'contact.address' | translate }}</span>
          </li>
          <li class="contact__item">
            <i class="icon icon-phone-solid-full"></i>
            <a href="tel:+37369136065">+(373) 69 13 60 65</a>
          </li>
          <li class="contact__item">
            <i class="icon icon-phone-solid-full"></i>
            <a href="tel:+37368996579">+(373) 68 99 65 79</a>
          </li>
          <li class="contact__item">
            <i class="icon icon-envelope-solid-full"></i>
            <a href="mailto:clg.chisinau@gmail.com">clg.chisinau@gmail.com</a>
          </li>
        </ul>

        <div class="contact__socials">
          <a class="contact__social" href="#" aria-label="Facebook" target="_blank" rel="noopener">
            <i class="icon icon-facebook-f-brands-solid-full"></i>
          </a>
          <!-- Viber: viber://chat?number= requires international format without + -->
          <a class="contact__social" href="viber://chat?number=37369136065" aria-label="Viber">
            <i class="icon icon-viber-brands-solid-full"></i>
          </a>
          <!-- WhatsApp: wa.me/ requires international format without + -->
          <a class="contact__social" href="https://wa.me/37369136065" aria-label="WhatsApp" target="_blank" rel="noopener">
            <i class="icon icon-whatsapp-brands-solid-full"></i>
          </a>
        </div>

        <a class="contact__map-btn" href="https://maps.app.goo.gl/bnon1T81pJCDwXh26" target="_blank" rel="noopener">
          {{ 'contact.mapBtn' | translate }}
        </a>
      </div>

      <!-- Right: map -->
      <div class="contact__map-wrap">
        <iframe
          class="contact__map"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d552.9490801702116!2d28.826501055627844!3d47.01937821106317!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40c97dc8548e430f%3A0x56e8fd0e0e6c9c44!2sCursuri%20limba%20germana!5e0!3m2!1sru!2sde!4v1775827060638!5m2!1sru!2sde"
          allowfullscreen
          loading="lazy"
          title="CLG Chișinău"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </div>
  </div>
</section>
