<section class="courses">
  <div class="container">
    <!-- Header row -->
    <div class="courses__header">
      <h2 class="courses__title">{{ 'courses.title' | translate }}</h2>
      <div class="courses__arrows">
        <button class="courses__arrow" id="courses-prev" aria-label="Previous">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              d="M12.5 15l-5-5 5-5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
        <button class="courses__arrow" id="courses-next" aria-label="Next">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              d="M7.5 5l5 5-5 5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Swiper -->
    <swiper-container
      slides-per-view="1.2"
      [space-between]="spaceBetween"
      [pagination]="{ clickable: true }"
      [navigation]="{ prevEl: '#courses-prev', nextEl: '#courses-next' }"
      [breakpoints]="{
        '640': { slidesPerView: 2, spaceBetween: 16 },
        '1024': { slidesPerView: 3, spaceBetween: 24 },
        '1280': { slidesPerView: 4, spaceBetween: 24 },
      }"
      class="courses__swiper">
      @for (course of courses; track course.level) {
        <swiper-slide>
          <div class="course-card">
            <span class="course-card__level">{{ course.level }}</span>
            <h3 class="course-card__title">{{ course.titleKey | translate }}</h3>

            <ul class="course-card__features">
              @for (feat of course.features; track feat) {
                <li class="course-card__feature">
                  <svg class="course-card__diamond" width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M7 1l2.5 5.5L7 13 4.5 6.5z" fill="#7c3aed" />
                    <path d="M1 7l5.5-2.5L13 7 6.5 9.5z" fill="#9333ea" />
                  </svg>
                  {{ feat | translate }}
                </li>
              }
            </ul>

            <button class="course-card__btn" (click)="openEnroll(course)">
              {{ 'courses.cta' | translate }}
            </button>
          </div>
        </swiper-slide>
      }
    </swiper-container>
  </div>
</section>
